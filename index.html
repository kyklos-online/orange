<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Orange Game</title>
<style>
  body {margin:0; overflow:hidden; font-family:sans-serif; }
  #ui {position:absolute; top:60px; left:10px; background:#fff; padding:10px; border-radius:5px; box-shadow:0 0 5px rgba(0,0,0,0.3); display:none;}
  #ui button {margin:2px;}
  #titleLabel {position:absolute; top:10px; left:10px; color:#FFA500; font-size:24px; font-weight:bold;}
  #pointsDiv {position:absolute; top:10px; right:10px; color:#000; font-size:20px;}
  #howtoModal, #howtoOverlay, #howtoBtn, #phraseDiv {display:none;}
</style>
</head>
<body>
<div id="titleLabel">orange game</div>
<div id="pointsDiv">Points: 0</div>
<div id="ui">
  <button id="handBtn">Hand (Pick up / Move)</button>
  <button id="blackHoleBtn">Toggle Black Hole</button>
  <button id="loopBtn">Loop (Side‑to‑Side)</button>
  <button id="resetBtn">Reset</button>
</div>
<canvas id="gameCanvas"></canvas>
<script>
  const canvas=document.getElementById('gameCanvas');
  const ctx=canvas.getContext('2d');
  const UI={mode:'hand',loop:false};
  const blackHole={enabled:false,x:300,y:300,radius:40,strength:0.02,dragging:false,offsetX:0,offsetY:0};
  let bgImage=null;
  const GRAVITY = 0.2; // gravity for orange slices
  const orange={
    x:200,y:200,r:50,angle:0,vx:0,vy:0,angularVel:0,
    dragging:false,name:'Orange',color:'#FFA500',visible:true,
    mass:5,strokes:[],originalColor:'#FFA500',isGold:false,isDiamond:false,
    speedMultiplier:1,hasNecklace:false,superspeed:false,supersize:false,
    baseR:50,baseSpeed:1,
    draw(){
      if(!this.visible) return;
      ctx.save();
      ctx.translate(this.x,this.y);
      ctx.rotate(this.angle);
      ctx.fillStyle=this.color;
      ctx.beginPath();
      ctx.arc(0,0,this.r,0,Math.PI*2);
      ctx.fill();
      // simple eyes
      ctx.fillStyle='#000';
      ctx.beginPath();
      ctx.arc(-15,-10,5,0,Math.PI*2);
      ctx.arc(15,-10,5,0,Math.PI*2);
      ctx.fill();
      // mouth
      ctx.beginPath();
      ctx.arc(0,5,15,0,Math.PI);
      ctx.stroke();
      ctx.restore();
      ctx.fillStyle='#000';
      ctx.font='16px sans-serif';
      ctx.textAlign='center';
      ctx.fillText(this.name,this.x,this.y-this.r-10);
    }
  };
  const slices=[];
  function resize(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
  }
  window.addEventListener('resize',resize);
  resize();

  // ---------- Persistence ----------
  function saveGame(){
    const state={orange:{x:orange.x,y:orange.y,vx:orange.vx,vy:orange.vy,angle:orange.angle,angularVel:orange.angularVel,visible:orange.visible},
                 slices:slices.map(s=>({x:s.x,y:s.y,r:s.r,vx:s.vx,vy:s.vy,angle:s.angle,angularVel:s.angularVel,color:s.color,isDiamond:s.isDiamond}))};
    localStorage.setItem('orangeGameState',JSON.stringify(state));
  }
  function loadGame(){
    const saved=localStorage.getItem('orangeGameState');
    if(saved){
      try{const state=JSON.parse(saved);
        if(state.orange){Object.assign(orange,state.orange);}
        if(state.slices){slices.length=0; state.slices.forEach(s=>slices.push(s));}
      }catch(e){console.error(e);} }
  }
  function resetGame(){
    localStorage.removeItem('orangeGameState');
    orange.x=canvas.width/2; orange.y=canvas.height/2; orange.vx=orange.vy=0; orange.angle=0; orange.angularVel=0; orange.visible=true;
    slices.length=0;
    document.getElementById('pointsDiv').textContent='Points: 0';
    saveGame();
  }

  // ---------- UI Buttons ----------
  document.getElementById('handBtn').onclick=()=>{UI.mode='hand';};
  document.getElementById('blackHoleBtn').onclick=()=>{blackHole.enabled=!blackHole.enabled; if(blackHole.enabled){blackHole.x=canvas.width/2; blackHole.y=canvas.height/2;}};
  document.getElementById('loopBtn').onclick=()=>{UI.loop=!UI.loop; if(!UI.loop){orange.vx=0;}};
  document.getElementById('resetBtn').onclick=resetGame;

  // ---------- Mouse interaction ----------
  let mouse={x:0,y:0,down:false};
  let draggedObj=null;
  canvas.addEventListener('mousedown',e=>{
    mouse.down=true; mouse.x=e.clientX; mouse.y=e.clientY;
    const bhDist=Math.hypot(mouse.x-blackHole.x,mouse.y-blackHole.y);
    if(blackHole.enabled && bhDist<=blackHole.radius){blackHole.dragging=true; blackHole.offsetX=mouse.x-blackHole.x; blackHole.offsetY=mouse.y-blackHole.y; return;}
    if(UI.mode==='hand'){
      if(orange.visible && Math.hypot(mouse.x-orange.x,mouse.y-orange.y)<=orange.r){draggedObj=orange; orange.dragging=true; return;}
      for(let i=slices.length-1;i>=0;i--){
        const s=slices[i];
        if(Math.hypot(mouse.x-s.x,mouse.y-s.y)<=s.r){draggedObj=s; s.dragging=true; return;}
      }
    }
  });
  canvas.addEventListener('mousemove',e=>{
    const prevX=mouse.x, prevY=mouse.y;
    mouse.x=e.clientX; mouse.y=e.clientY;
    if(blackHole.dragging){blackHole.x=mouse.x-blackHole.offsetX; blackHole.y=mouse.y-blackHole.offsetY;}
    if(draggedObj && draggedObj.dragging){
      const dx=mouse.x-prevX, dy=mouse.y-prevY;
      draggedObj.x+=dx; draggedObj.y+=dy;
      if(draggedObj===orange){orange.angle+=Math.atan2(dy,dx);} else {draggedObj.vx=0; draggedObj.vy=0;}
    }
  });
  canvas.addEventListener('mouseup',e=>{
    mouse.down=false;
    if(blackHole.dragging){blackHole.dragging=false;}
    if(draggedObj){draggedObj.dragging=false; draggedObj=null;}
  });

  // ---------- Slice creation (simple) ----------
  function createSlices(cx,cy){
    const count = orange.isDiamond ? 12 : 8;
    for(let i=0;i<count;i++){
      const angle=(Math.PI*2/count)*i;
      const isDiamondSlice=orange.isDiamond;
      const speedFactor = isDiamondSlice ? 4 : 2;
      slices.push({
        x:cx+Math.cos(angle)*orange.r,
        y:cy+Math.sin(angle)*orange.r,
        r:isDiamondSlice?orange.r/3:orange.r/2,
        vx:Math.cos(angle)*speedFactor+(Math.random()-0.5),
        vy:Math.sin(angle)*speedFactor+(Math.random()-0.5),
        angle:0,
        angularVel:(Math.random()-0.5)*0.1,
        dragging:false,
        color:orange.color,
        isDiamond:isDiamondSlice,
        draw(){
          ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.angle);
          ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill();
          ctx.restore();
        }
      });
    }
  }

  // ---------- Main loop ----------
  function mainLoop(){
    // Background clear
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // Black hole visual
    if(blackHole.enabled){
      ctx.save();
      ctx.translate(blackHole.x,blackHole.y);
      ctx.fillStyle='rgba(0,0,0,0.5)';
      ctx.beginPath();
      ctx.arc(0,0,blackHole.radius,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    // Attraction toward black hole
    if(blackHole.enabled){
      const attract=obj=>{
        const dx=blackHole.x-obj.x, dy=blackHole.y-obj.y;
        const dist=Math.hypot(dx,dy);
        if(dist<1) return;
        const force=blackHole.strength*obj.mass;
        obj.vx+=dx/dist*force;
        obj.vy+=dy/dist*force;
      };
      attract(orange);
      slices.forEach(attract);
    }
    // Update positions
    orange.x+=orange.vx; orange.y+=orange.vy; orange.angle+=orange.angularVel;
    slices.forEach(s=>{
      s.x+=s.vx; s.y+=s.vy; s.angle+=s.angularVel;
      // apply gravity to slices
      s.vy+=GRAVITY;
    });
    // Loop movement for orange
    if(UI.loop){
      orange.x+=orange.speedMultiplier*2;
      if(orange.x - orange.r > canvas.width) orange.x = -orange.r;
    }
    // Draw entities
    orange.draw();
    slices.forEach(s=>s.draw());
    // Save state
    saveGame();
    requestAnimationFrame(mainLoop);
  }

  // Load previous state and start
  loadGame();
  // Center orange on load
  orange.x=canvas.width/2; orange.y=canvas.height/2;
  document.getElementById('ui').style.display='block';
  requestAnimationFrame(mainLoop);
</script>
</body>
</html>
