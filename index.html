<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Orange Game</title>
<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; background:#f0f0f0; }
  #ui {
    position:absolute; top:10px; left:10px; background:#fff; padding:10px; border-radius:5px; box-shadow:0 0 5px rgba(0,0,0,0.3);
  }
  #ui button { margin:2px; }
  #nameInput { width:120px; }
</style>
</head>
<body>
<div id="ui">
  <label>Name: <input type="text" id="nameInput" placeholder="Orange name" /></label>
  <br/>
  <button id="swordBtn">Sword (Slice)</button>
  <button id="racketBtn">Tennis Racket (Smack)</button>
  <button id="handBtn">Hand (Pick up)</button>
</div>
<canvas id="gameCanvas"></canvas>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const UI = {
    mode: null, // 'sword','racket','hand'
  };
  const orange = {
    x: 200,
    y: 200,
    r: 50,
    angle: 0,
    dragging: false,
    name: 'Orange',
    draw() {
      // orange body
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.fillStyle = '#FFA500';
      ctx.beginPath();
      ctx.arc(0, 0, this.r, 0, Math.PI * 2);
      ctx.fill();
      // smiley face
      ctx.fillStyle = '#000';
      // eyes
      ctx.beginPath();
      ctx.arc(-15, -10, 5, 0, Math.PI * 2);
      ctx.arc(15, -10, 5, 0, Math.PI * 2);
      ctx.fill();
      // mouth
      ctx.beginPath();
      ctx.arc(0, 5, 15, 0, Math.PI);
      ctx.stroke();
      ctx.restore();
      // name label
      ctx.fillStyle = '#000';
      ctx.font = '16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(this.name, this.x, this.y - this.r - 10);
    }
  };
  const slices = [];
  const cup = {
    x: canvas.width / 2,
    y: canvas.height - 40,
    w: 120,
    h: 30,
    draw() {
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(this.x - this.w/2, this.y - this.h/2, this.w, this.h);
    }
  };

  // Resize canvas
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cup.x = canvas.width / 2;
    cup.y = canvas.height - 40;
  }
  window.addEventListener('resize', resize);
  resize();

  // UI button handling
  document.getElementById('swordBtn').onclick = () => { UI.mode = UI.mode === 'sword' ? null : 'sword'; };
  document.getElementById('racketBtn').onclick = () => { UI.mode = UI.mode === 'racket' ? null : 'racket'; };
  document.getElementById('handBtn').onclick = () => { UI.mode = UI.mode === 'hand' ? null : 'hand'; };

  // Name input handling
  document.getElementById('nameInput').addEventListener('input', e => {
    orange.name = e.target.value || 'Orange';
  });

  // Mouse interaction
  let mouse = {x:0, y:0, down:false};
  canvas.addEventListener('mousedown', e => {
    mouse.down = true;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    // Check hand mode for picking up orange
    if (UI.mode === 'hand') {
      const d = Math.hypot(mouse.x - orange.x, mouse.y - orange.y);
      if (d <= orange.r) {
        orange.dragging = true;
      }
    }
  });
  canvas.addEventListener('mousemove', e => {
    const prevX = mouse.x, prevY = mouse.y;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    if (orange.dragging) {
      const dx = mouse.x - prevX;
      const dy = mouse.y - prevY;
      orange.x += dx;
      orange.y += dy;
      orange.angle += Math.atan2(dy, dx);
    }
  });
  canvas.addEventListener('mouseup', e => {
    mouse.down = false;
    if (orange.dragging) {
      orange.dragging = false;
    } else {
      // If not dragging, handle tool actions
      const clickX = e.clientX;
      const clickY = e.clientY;
      const distToOrange = Math.hypot(clickX - orange.x, clickY - orange.y);
      if (UI.mode === 'sword' && distToOrange <= orange.r) {
        // Slice orange into two slices
        createSlices(orange.x, orange.y);
        orange.visible = false; // hide original orange
      } else if (UI.mode === 'racket') {
        // Apply impulse to nearby slices
        slices.forEach(s => {
          const d = Math.hypot(s.x - clickX, s.y - clickY);
          if (d < 100) {
            const angle = Math.atan2(s.y - clickY, s.x - clickX);
            s.vx += Math.cos(angle) * 5;
            s.vy += Math.sin(angle) * 5;
          }
        });
      }
    }
  });

  function createSlices(cx, cy) {
    for (let i = 0; i < 4; i++) {
      const angle = (Math.PI * 2 / 4) * i;
      slices.push({
        x: cx + Math.cos(angle) * orange.r,
        y: cy + Math.sin(angle) * orange.r,
        r: orange.r / 2,
        vx: Math.cos(angle) * 2 + (Math.random()-0.5),
        vy: Math.sin(angle) * 2 + (Math.random()-0.5),
        angle: 0,
        angularVel: (Math.random()-0.5) * 0.1,
        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.angle);
          ctx.fillStyle = '#FF8C00';
          ctx.beginPath();
          ctx.arc(0,0,this.r,0,Math.PI*2);
          ctx.fill();
          // simple smiley on slice
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(-this.r/3, -this.r/4, this.r/10,0,Math.PI*2);
          ctx.arc(this.r/3, -this.r/4, this.r/10,0,Math.PI*2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(0,0,this.r/3,0,Math.PI);
          ctx.stroke();
          ctx.restore();
        }
      });
    }
  }

  function updateSlices() {
    for (const s of slices) {
      s.x += s.vx;
      s.y += s.vy;
      s.vy += 0.1; // gravity-like effect for bounce realism
      s.angle += s.angularVel;
      // bounce off walls
      if (s.x - s.r < 0) { s.x = s.r; s.vx *= -0.8; }
      if (s.x + s.r > canvas.width) { s.x = canvas.width - s.r; s.vx *= -0.8; }
      if (s.y - s.r < 0) { s.y = s.r; s.vy *= -0.8; }
      if (s.y + s.r > canvas.height) { s.y = canvas.height - s.r; s.vy *= -0.8; }
    }
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    cup.draw();
    if (orange.visible !== false) orange.draw();
    slices.forEach(s => s.draw());
    requestAnimationFrame(draw);
  }

  function loop() {
    updateSlices();
    requestAnimationFrame(loop);
  }

  // start loops
  draw();
  loop();
</script>
</body>
</html>
