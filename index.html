<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Orange Game</title>
<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; background:#f0f0f0; }
  #ui {
    position:absolute; top:10px; left:10px; background:#fff; padding:10px; border-radius:5px; box-shadow:0 0 5px rgba(0,0,0,0.3);
  }
  #ui button { margin:2px; }
  #nameInput { width:120px; }
</style>
</head>
<body>
<div id="ui">
  <label>Name: <input type="text" id="nameInput" placeholder="Orange name" /></label>
  <br/>
  <button id="swordBtn">Sword (Slice)</button>
  <button id="racketBtn">Tennis Racket (Smack)</button>
  <button id="handBtn">Hand (Pick up)</button>
  <button id="deleteBtn">Delete (Remove Block)</button>
  <button id="drawBtn">Draw (On Orange)</button>
  <button id="fanBtn">Fan (Gust)</button>
  <button id="loopBtn">Loop (Side‑to‑Side)</button>
  <button id="resetBtn">Reset</button>
</div>
<canvas id="gameCanvas"></canvas>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const UI = { mode: null, loop: false };
  const fan = { enabled: false, dirIndex: 0, dirs: ['left','right','down','up'], size: 60 };

  const orange = {
    x: 200,
    y: 200,
    r: 50,
    angle: 0,
    vx: 0,
    vy: 0,
    angularVel: 0,
    dragging: false,
    name: 'Orange',
    visible: true,
    mass: 5,
    strokes: [], // for drawing on orange
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.angle);
      ctx.fillStyle = '#FFA500';
      ctx.beginPath();
      ctx.arc(0, 0, this.r, 0, Math.PI * 2);
      ctx.fill();

      // smiley face
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(-15, -10, 5, 0, Math.PI * 2);
      ctx.arc(15, -10, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, 5, 15, 0, Math.PI);
      ctx.stroke();

      // draw user strokes
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth = 2;
      this.strokes.forEach(stroke => {
        ctx.beginPath();
        stroke.forEach((p, i) => {
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();
      });

      ctx.restore();
      // name label above orange
      ctx.fillStyle = '#000';
      ctx.font = '16px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(this.name, this.x, this.y - this.r - 10);
    }
  };

  const slices = [];

  const cup = {
    x: canvas.width / 2,
    y: canvas.height - 40,
    w: 120,
    h: 30,
    draw() {
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(this.x - this.w/2, this.y - this.h/2, this.w, this.h);
    }
  };

  const blocks = [];
  function createBlocks(count = 3) {
    for (let i = 0; i < count; i++) {
      const size = 40;
      blocks.push({
        x: Math.random() * (canvas.width - size) + size/2,
        y: Math.random() * (canvas.height - size) + size/2,
        w: size,
        h: size,
        vx: 0,
        vy: 0,
        color: '#4682B4',
        draw() {
          ctx.fillStyle = this.color;
          ctx.fillRect(this.x - this.w/2, this.y - this.h/2, this.w, this.h);
        }
      });
    }
  }

  // Resize canvas
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    cup.x = canvas.width / 2;
    cup.y = canvas.height - 40;
  }
  window.addEventListener('resize', resize);
  resize();
  createBlocks();

  // UI button handling
  document.getElementById('swordBtn').onclick = () => { UI.mode = UI.mode === 'sword' ? null : 'sword'; };
  document.getElementById('racketBtn').onclick = () => { UI.mode = UI.mode === 'racket' ? null : 'racket'; };
  document.getElementById('handBtn').onclick = () => { UI.mode = UI.mode === 'hand' ? null : 'hand'; };
  document.getElementById('deleteBtn').onclick = () => { UI.mode = UI.mode === 'delete' ? null : 'delete'; };
  document.getElementById('drawBtn').onclick = () => { UI.mode = UI.mode === 'draw' ? null : 'draw'; };
  document.getElementById('fanBtn').onclick = () => {
    if (!fan.enabled) return; // fan only works after a slice event
    fan.dirIndex = (fan.dirIndex + 1) % fan.dirs.length;
    applyFanGust();
  };
  document.getElementById('loopBtn').onclick = () => {
    UI.loop = !UI.loop;
    if (!UI.loop) { orange.vx = 0; }
  };
  document.getElementById('resetBtn').onclick = resetGame;

  // Name input handling
  document.getElementById('nameInput').addEventListener('input', e => {
    orange.name = e.target.value || 'Orange';
  });

  // Mouse interaction
  let mouse = {x:0, y:0, down:false};
  let draggedObj = null; // orange or slice
  let currentStroke = null; // for drawing on orange
  canvas.addEventListener('mousedown', e => {
    mouse.down = true;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    if (UI.mode === 'hand') {
      for (let i = slices.length-1; i >=0; i--) {
        const s = slices[i];
        if (Math.hypot(mouse.x - s.x, mouse.y - s.y) <= s.r) { draggedObj = s; s.dragging = true; break; }
      }
      if (!draggedObj && orange.visible) {
        if (Math.hypot(mouse.x - orange.x, mouse.y - orange.y) <= orange.r) { draggedObj = orange; orange.dragging = true; }
      }
    } else if (UI.mode === 'draw' && orange.visible) {
      if (Math.hypot(mouse.x - orange.x, mouse.y - orange.y) <= orange.r) {
        const local = {x: mouse.x - orange.x, y: mouse.y - orange.y};
        currentStroke = [local];
        orange.strokes.push(currentStroke);
      }
    }
  });
  canvas.addEventListener('mousemove', e => {
    const prevX = mouse.x, prevY = mouse.y;
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    if (draggedObj && draggedObj.dragging) {
      const dx = mouse.x - prevX;
      const dy = mouse.y - prevY;
      draggedObj.x += dx;
      draggedObj.y += dy;
      if (draggedObj === orange) {
        orange.angle += Math.atan2(dy, dx);
      } else {
        draggedObj.vx = 0; draggedObj.vy = 0;
      }
    }
    if (UI.mode === 'draw' && currentStroke) {
      const local = {x: mouse.x - orange.x, y: mouse.y - orange.y};
      currentStroke.push(local);
    }
  });
  canvas.addEventListener('mouseup', e => {
    mouse.down = false;
    if (draggedObj) {
      draggedObj.dragging = false;
      draggedObj = null;
      return; // skip tool actions when dragging
    }
    if (UI.mode === 'draw') {
      currentStroke = null;
    }
    const clickX = e.clientX;
    const clickY = e.clientY;
    const distToOrange = Math.hypot(clickX - orange.x, clickY - orange.y);
    if (UI.mode === 'sword' && orange.visible && distToOrange <= orange.r) {
      createSlices(orange.x, orange.y);
      orange.visible = false;
      fan.enabled = true; // enable fan after slicing
      // assign random name to one slice
      if (slices.length) {
        const randIdx = Math.floor(Math.random() * slices.length);
        slices[randIdx].name = orange.name;
      }
    } else if (UI.mode === 'racket') {
      // Impulse to slices
      slices.forEach(s => {
        const d = Math.hypot(s.x - clickX, s.y - clickY);
        if (d < 100) {
          const angle = Math.atan2(s.y - clickY, s.x - clickX);
          const impulse = 5;
          s.vx += Math.cos(angle) * impulse;
          s.vy += Math.sin(angle) * impulse;
        }
      });
      // Impulse to whole orange
      if (orange.visible && distToOrange < 100) {
        const angle = Math.atan2(orange.y - clickY, orange.x - clickX);
        const impulse = 5 / orange.mass;
        orange.vx += Math.cos(angle) * impulse;
        orange.vy += Math.sin(angle) * impulse;
        orange.angularVel += (Math.random() - 0.5) * 0.2;
      }
    } else if (UI.mode === 'delete') {
      for (let i = blocks.length - 1; i >= 0; i--) {
        const b = blocks[i];
        if (clickX > b.x - b.w/2 && clickX < b.x + b.w/2 &&
            clickY > b.y - b.h/2 && clickY < b.y + b.h/2) {
          blocks.splice(i, 1);
          break;
        }
      }
    }
  });

  function createSlices(cx, cy) {
    const sliceCount = 8; // split into 8 mini oranges
    for (let i = 0; i < sliceCount; i++) {
      const angle = (Math.PI * 2 / sliceCount) * i;
      slices.push({
        x: cx + Math.cos(angle) * orange.r,
        y: cy + Math.sin(angle) * orange.r,
        r: orange.r / 2,
        vx: Math.cos(angle) * 2 + (Math.random() - 0.5),
        vy: Math.sin(angle) * 2 + (Math.random() - 0.5),
        angle: 0,
        angularVel: (Math.random() - 0.5) * 0.1,
        dragging: false,
        name: '',
        mass: 1,
        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.angle);
          ctx.fillStyle = '#FF8C00';
          ctx.beginPath();
          ctx.arc(0,0,this.r,0,Math.PI*2);
          ctx.fill();
          // smiley
          ctx.fillStyle = '#000';
          ctx.beginPath();
          ctx.arc(-this.r/3, -this.r/4, this.r/10,0,Math.PI*2);
          ctx.arc(this.r/3, -this.r/4, this.r/10,0,Math.PI*2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(0,0,this.r/3,0,Math.PI);
          ctx.stroke();
          if (this.name) {
            ctx.fillStyle = '#000';
            ctx.font = '14px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(this.name, 0, -this.r - 5);
          }
          ctx.restore();
        }
      });
    }
  }

  function updateSlices() {
    for (const s of slices) {
      if (!s.dragging) {
        s.x += s.vx;
        s.y += s.vy;
        s.vy += 0.1; // gravity
        s.angle += s.angularVel;
        // wall bounce
        if (s.x - s.r < 0) { s.x = s.r; s.vx *= -0.8; }
        if (s.x + s.r > canvas.width) { s.x = canvas.width - s.r; s.vx *= -0.8; }
        if (s.y - s.r < 0) { s.y = s.r; s.vy *= -0.8; }
        if (s.y + s.r > canvas.height) { s.y = canvas.height - s.r; s.vy *= -0.8; }
      }
    }
  }

  function updateOrange() {
    if (!orange.dragging && orange.visible) {
      if (UI.loop) orange.vx = 2; // constant rightward when looping
      orange.x += orange.vx;
      orange.y += orange.vy;
      orange.vy += 0.1; // gravity
      orange.angle += orange.angularVel;
      // wall bounce / wrap for looping
      if (orange.x - orange.r < 0) {
        if (UI.loop) orange.x = canvas.width - orange.r; else { orange.x = orange.r; orange.vx *= -0.8; }
      }
      if (orange.x + orange.r > canvas.width) {
        if (UI.loop) orange.x = orange.r; else { orange.x = canvas.width - orange.r; orange.vx *= -0.8; }
      }
      if (orange.y - orange.r < 0) { orange.y = orange.r; orange.vy *= -0.8; }
      if (orange.y + orange.r > canvas.height) { orange.y = canvas.height - orange.r; orange.vy *= -0.8; }
    }
  }

  function updateBlocks() {
    for (const b of blocks) {
      // static blocks – no movement
      if (orange.visible) {
        const dx = Math.abs(b.x - orange.x);
        const dy = Math.abs(b.y - orange.y);
        const distance = Math.hypot(dx, dy);
        if (distance < orange.r + Math.max(b.w, b.h)/2) {
          const angle = Math.atan2(orange.y - b.y, orange.x - b.x);
          const push = 2;
          orange.vx += Math.cos(angle) * push;
          orange.vy += Math.sin(angle) * push;
        }
      }
      slices.forEach(s => {
        const d = Math.hypot(b.x - s.x, b.y - s.y);
        if (d < s.r + Math.max(b.w, b.h)/2) {
          const angle = Math.atan2(s.y - b.y, s.x - b.x);
          const push = 2;
          s.vx += Math.cos(angle) * push;
          s.vy += Math.sin(angle) * push;
        }
      });
    }
  }

  function applyFanGust() {
    const dir = fan.dirs[fan.dirIndex];
    const magnitude = 3;
    let vx = 0, vy = 0;
    if (dir === 'left') vx = -magnitude;
    else if (dir === 'right') vx = magnitude;
    else if (dir === 'up') vy = -magnitude;
    else if (dir === 'down') vy = magnitude;
    // Apply to all slices
    slices.forEach(s => { s.vx += vx; s.vy += vy; });
    // Also affect whole orange if still visible
    if (orange.visible) { orange.vx += vx; orange.vy += vy; }
  }

  function drawFan() {
    if (!fan.enabled) return;
    const centerX = 80;
    const centerY = 80;
    const size = fan.size;
    const dir = fan.dirs[fan.dirIndex];
    let angle = 0;
    if (dir === 'left') angle = Math.PI;
    else if (dir === 'right') angle = 0;
    else if (dir === 'up') angle = -Math.PI/2;
    else if (dir === 'down') angle = Math.PI/2;
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(angle);
    ctx.fillStyle = '#00BFFF';
    ctx.fillRect(-size/2, -size/4, size, size/2);
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    cup.draw();
    drawFan();
    if (orange.visible) orange.draw();
    slices.forEach(s => s.draw());
    blocks.forEach(b => b.draw());
    requestAnimationFrame(draw);
  }

  function loop() {
    updateSlices();
    updateOrange();
    updateBlocks();
    requestAnimationFrame(loop);
  }

  function resetGame() {
    orange.x = 200; orange.y = 200; orange.angle = 0;
    orange.vx = orange.vy = orange.angularVel = 0;
    orange.visible = true; orange.dragging = false;
    orange.name = document.getElementById('nameInput').value || 'Orange';
    orange.strokes = [];
    slices.length = 0;
    UI.mode = null; UI.loop = false;
    fan.enabled = false; fan.dirIndex = 0;
    blocks.length = 0; createBlocks();
  }

  // start loops
  draw();
  loop();
</script>
</body>
</html>
